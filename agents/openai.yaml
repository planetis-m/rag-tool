interface:
  display_name: "RAG Tool"
  short_description: "Store and search chunkvec documents for retrieval"
  default_prompt: "Use $rag-tool to ingest or search text with chunkvec. In store mode, prepare semantically coherent `<chunk ...>` input with only optional page and label metadata, then run cvstore against the internal database with stable `--doc`, required `--kind`, and optional `--source`. In search mode, run cvquery on the internal database with one raw semantic query string and add filter flags only when the user explicitly asks to narrow scope."
